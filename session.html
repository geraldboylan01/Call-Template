<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Redirecting to Planeir session viewer</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "Manrope", "Segoe UI", sans-serif;
        background: #09101d;
        color: #f4f8ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(900px 640px at 20% 0%, rgba(63, 120, 198, 0.22), transparent 55%),
          radial-gradient(700px 500px at 100% 100%, rgba(23, 92, 172, 0.18), transparent 55%),
          linear-gradient(160deg, #05080f 0%, #0b1426 100%);
      }

      .redirect-card {
        width: min(520px, 100%);
        padding: 28px;
        border-radius: 24px;
        border: 1px solid rgba(126, 170, 221, 0.24);
        background: rgba(9, 18, 34, 0.84);
        box-shadow: 0 24px 56px rgba(1, 6, 16, 0.42);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 5vw, 2.4rem);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: #c8dbf2;
        line-height: 1.7;
      }

      a {
        color: #8fd0ff;
      }
    </style>
  </head>
  <body>
    <main class="redirect-card">
      <h1>Opening client session</h1>
      <p>
        Redirecting to the current Planeir client session viewer.
        If nothing happens, <a id="redirectLink" href="./app/session.html">open it here</a>.
      </p>
    </main>
    <script>
      (function redirectToCurrentSessionViewer() {
        const target = new URL('./app/session.html', window.location.href);
        target.search = window.location.search;
        target.hash = window.location.hash;

        const fallbackLink = document.getElementById('redirectLink');
        if (fallbackLink) {
          fallbackLink.href = target.toString();
        }

        window.location.replace(target.toString());
      })();
    </script>
  </body>
</html>
